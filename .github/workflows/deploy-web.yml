name: deploy-web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml
      # Expo's CLI runs from mobile/, so its deps must be installed there.
      # web/ has no real deps — just the build script.
      - run: pnpm install --frozen-lockfile
        working-directory: mobile
      - run: pnpm build
        working-directory: web
        env:
          # The Expo app lives at /<repo>/app/ so its absolute asset URLs need
          # the matching prefix. The hand-written landing at /<repo>/ uses only
          # relative URLs and works at any subpath.
          ROVE_WEB_BASE_URL: /${{ github.event.repository.name }}/app/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
