<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="Rove mark">
  <title>Rove</title>
  <!-- Two nodes connected by a curve — your phone and your machine, roving apart but tethered. -->
